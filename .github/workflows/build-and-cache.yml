name: Build and Cachix

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (PR validation)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build default package
        run: nix build .#packages.x86_64-linux.default --print-build-logs

  build-and-push-cache:
    name: Build and push to Cachix
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Validate Cachix token
        run: |
          if [ -z "${{ secrets.CACHIX_AUTH_TOKEN }}" ]; then
            echo "Missing CACHIX_AUTH_TOKEN repository secret."
            echo "Create it in GitHub: Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: saint
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build default package
        run: nix build .#packages.x86_64-linux.default --print-build-logs
